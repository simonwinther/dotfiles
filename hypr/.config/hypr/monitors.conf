# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
env = GDK_SCALE,2
monitor=,preferred,auto,auto

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.6

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# env = GDK_SCALE,1
# monitor=,preferred,auto,1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2


# Setup when working in common room (Dorm)
# This is why Nix would be nice, so I don't do this hardcoded shit, but whatever
# monitor = HDMI-A-1,1920x1080@60,0x0,1
# monitor = eDP-1,1920x1080@60.02,0x1080,1

# Min stationær monitors
monitor = HDMI-A-1, 1920x1080@100, 0x0, 1
monitor = DP-2, 1920x1080@165, 1920x0, 1
monitor = DVI-D-1, 1920x1080@144, 3840x0, 1, transform, 3

# Laptop
monitor = eDP-1, 1920x1080@60.02, 0x0, 1.2

# AI Pioneer (top-to-bottom)
# monitor = HDMI-A-1, 2560x1440@59.95, 0x0, 1
# monitor = eDP-1, 1920x1080@60.02, 480x1440, 1.2

# Left-to-right: laptop on the left, external monitor on the right
# monitor = eDP-1, 1920x1080@60.02, 0x270, 1.2
# monitor = HDMI-A-1, 2560x1440@59.95, 1600x0, 1

# Right-to-left: external monitor on the left, laptop on the right
# monitor = HDMI-A-1, 2560x1440@59.95, 0x0, 1
# monitor = eDP-1, 1920x1080@60.02, 2560x270, 1.2
