# App launch variables
$terminal = uwsm app -- ghostty
$browser = firefox --force-device-scale-factor=0.8

# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"

unbind = SUPER, B
unbind = SUPER ALT, LEFT
unbind = SUPER ALT, RIGHT
unbind = SUPER ALT, UP
unbind = SUPER ALT, DOWN
unbind = SUPER CTRL, LEFT
unbind = SUPER CTRL, RIGHT
unbind = SUPER CTRL, SPACE
unbind = SUPER SHIFT, G

bindd = SUPER, B, Open Browser, exec, $browser
bindd = SUPER CTRL, Space, Launch Waypaper, exec, waypaper

bindde = SUPER ALT, left, Resize window left, resizeactive, -20 0
bindde = SUPER ALT, right, Resize window right, resizeactive, 20 0
bindde = SUPER ALT, up, Resize window up, resizeactive, 0 -20
bindde = SUPER ALT, down, Resize window down, resizeactive, 0 20

bindd = SUPER CTRL, left, Move window to previous workspace, movetoworkspace, r-1
bindd = SUPER CTRL, right, Move window to next workspace, movetoworkspace, r+1

bind = SUPER SHIFT, L, exec, latexocr

bindd = SUPER SHIFT, G, Lazygit, exec, omarchy-launch-tui lazygit
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop

bindd = SUPER SHIFT ALT, A, Gemini, exec, omarchy-launch-webapp "https://gemini.google.com/"
bindd = SUPER SHIFT, C, Online Reinforcement Learning GPT, exec, omarchy-launch-webapp "https://chatgpt.com/g/g-p-698420698d708191aa845c44f3f7008a-orel/project"
bindd = SUPER SHIFT, V, Numerical Optimization GPT, exec, omarchy-launch-webapp "https://chatgpt.com/g/g-p-6981efc82ac88191a21838dfc36442a2-no/project"

bindd = SUPER, H, Toggle Special Workspace, togglespecialworkspace, hidden
bindd = SUPER SHIFT, H, Move Window to Special Workspace, movetoworkspace, special:hidden
bindd = SUPER SHIFT, S, Move Window to Special Workspace, movetoworkspace, special:scratchpad

bindd = SUPER SHIFT, E, Launch Nautilus, exec, nautilus
bindd = SUPER, D, Launch Discord, exec, flatpak run com.discordapp.Discord
bindd = SUPER, E, Launch Yazi in Ghostty, exec, ghostty -e yazi

bindd = SUPER ALT, D, Speech-to-text, exec, /usr/lib/hyprwhspr/config/hyprland/hyprwhspr-tray.sh record

bindd = SUPER SHIFT, R, Reload Hyprland configuration, exec, hyprctl reload

bindd = SUPER ALT, Comma, Invoke last notification, exec, makoctl invoke
bind = SUPER ALT, PERIOD, exec, ghostty --class=global.snip -e /home/simon/.local/bin/globalsnip
bind = SUPER ALT, M, exec, ghostty --class=macro.picker -e /home/simon/.local/bin/macro-picker

# ===== Overridden default Omarchy bindings (reference) =====
# bindd = SUPER CTRL, left, Move grouped window focus left, changegroupactive, b
# bindd = SUPER CTRL, right, Move grouped window focus right, changegroupactive, f
# bindd = SUPER CTRL, SPACE, Theme background menu, exec, omarchy-theme-background-menu
