# Workspace placement
workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:DP-2
workspace = 3, monitor:DVI-D-1

# Power behavior
misc {
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# Window rules migrated from omarchy-supplement/hypr/hyprland-overrides.conf
windowrule {
  name = stretchly-giant
  float = on
  monitor = DP-2
  move = 0 0
  size = 1920 1080
  pin = on
  match:class = ^(Stretchly)$
}

windowrule {
  name = global-snip
  match:class = ^global\.snip$
  float = on
  size = (monitor_w*0.9) (monitor_h*0.6)
  center = on
}

windowrule {
  name = macro-picker
  match:class = ^macro\.picker$
  float = on
  size = (monitor_w*0.9) (monitor_h*0.5)
  center = on
}

  windowrule {
    name = waypaper-floating
    float = on
    size = 850 400
    center = on
    border_color = rgba(89b4faff) rgba(f5c2e7ff) 45deg
    match:class = (waypaper)
  }

windowrule {
  name = waypaper-pinned
  pin = on
  match:class = (waypaper)
}

windowrule {
  name = waypaper-opacity
  opacity = 0.7 0.6
  match:class = (waypaper)
}
