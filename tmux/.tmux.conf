# =====================================
# GLOBAL SETTINGS
# =====================================
set -s default-terminal "tmux-256color"

set -g xterm-keys on
set -g extended-keys on
set -s terminal-features[3] "xterm-ghostty:RGB,extkeys"

# Enable mouse support
set -g mouse on

# Start windows and panes from 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Position status bar at top
set -g status-position top

# Performance settings
set -s escape-time 0          # Zero-delay for key presses (essential for Vim)
set -g history-limit 50000    # Increase scrollback buffer size
set -g focus-events on        # Needed for 'autoread' to work in Neovim
set -g status-interval 10      # Update status every 5 seconds

# Automatically rename windows based on current directory
set -g automatic-rename on
set -g automatic-rename-format '#{pane_current_command}'

# =====================================
# KEYBINDINGS
# =====================================

# Change prefix to C-a
unbind-key -qn C-Space
set -g prefix C-Space
bind C-Space send-prefix

# Reload config
unbind r
bind r source-file ~/.tmux.conf

# Split panes in the current pane's directory
unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# New window in the current pane's directory
bind c new-window -c "#{pane_current_path}"

# Vim-style pane resizing
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Move and swap panes with Alt + Arrow keys
bind-key -n M-Left  swap-window -t -1 \; select-window -t -1
bind-key -n M-Right swap-window -t +1 \; select-window -t +1

# New window in current path
bind M-c attach-session -c "#{pane_current_path}"

# Vim-style copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection 
bind-key -T copy-mode-vi 'y' send -X copy-selection 
unbind -T copy-mode-vi MouseDragEnd1Pane

# =====================================
# Status bar
# =====================================

# --- Base Status Bar Settings ---
set -g status-bg "#1a1b26"
set -g status-fg "#c0caf5"
set -g status-interval 5
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100
set -g window-status-separator ""

# --- Window Status Format ---
# Inactive window 
set -g window-status-format '#[fg=#414868, bg=#1a1b26]ÓÉó#[fg=#c0caf5, bg=#414868] #I #[fg=#c0caf5, bg=#414868]ÓāĪ #[fg=#c0caf5, bg=#414868]#W #[fg=#414868, bg=#1a1b26]Óāį'

# Active window
set -g window-status-current-format '#[fg=#bb9af7, bg=#1a1b26]ÓÉó#[fg=#1a1b26, bg=#bb9af7, bold] #I #[fg=#1a1b26, bg=#bb9af7, bold]ÓāĪ #[fg=#1a1b26, bg=#bb9af7, bold]#W #[fg=#bb9af7, bg=#1a1b26]Óāį'

# --- Status Left ---
set -g status-left '#{?client_prefix,#[fg=#15161e bg=#e0af68 bold] ůįął ,#[fg=#15161e bg=#7aa2f7 bold] ůįął }#[fg=#7aa2f7, bg=#1a1b26]#{?client_prefix,#[fg=#e0af68],}Óāį#[fg=#7aa2f7, bg=#1a1b26, bold] #{session_name} #[fg=#1a1b26, bg=#414868]Óāį#[fg=#c0caf5, bg=#414868] ůįďĺ PID [#{pane_pid}] #[fg=#414868, bg=#1a1b26]Óāį#[fg=#7aa2f7, bg=#1a1b26]ÓāĪ'

# --- Status Right ---
# set -g status-right '#[fg=#7aa2f7, bg=#1a1b26]Óā≥#[fg=#414868, bg=#1a1b26]Óā≤#[fg=#7aa2f7, bg=#414868] ůįćé #(echo "#{pane_current_path}" | sed "s|$HOME|~|" | rev | cut -d"/" -f1-3 | rev) #[fg=#7aa2f7, bg=#414868]Óā≤#[fg=#15161e, bg=#7aa2f7, bold] ÔĄČ #h '
set -g status-right ''

# --- Pane Borders ---
# set -g pane-border-style fg="#414868"
# set -g pane-active-border-style fg="#7aa2f7"

# Gray pane borders
set -g pane-active-border-style "bg=default,fg=#585b70"
set -g pane-border-style "bg=default,fg=#585b70"

# --- Message Style ---
set -g message-style fg="#c0caf5",bg="#414868"

# =====================================
# PLUGINS
# =====================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' 
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
